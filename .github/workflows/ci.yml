name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Go checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Generate coverage profile
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out > coverage.txt
          go test -covermode=atomic -coverprofile=internal-coverage.out ./internal/...
          go tool cover -func=internal-coverage.out > internal-coverage.txt
          {
            echo "## Coverage"
            echo
            echo "Full repository:"
            echo '```text'
            tail -n 1 coverage.txt
            echo '```'
            echo
            echo "Internal packages:"
            echo '```text'
            tail -n 1 internal-coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce internal coverage floor
        run: |
          internal_total="$(tail -n 1 internal-coverage.txt | awk '{print $3}' | tr -d '%')"
          awk -v coverage="$internal_total" 'BEGIN {
            if (coverage < 80.0) {
              printf("internal coverage %.1f%% is below the 80.0%% floor\n", coverage)
              exit 1
            }
            printf("internal coverage %.1f%% meets the 80.0%% floor\n", coverage)
          }'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
            internal-coverage.out
            internal-coverage.txt
