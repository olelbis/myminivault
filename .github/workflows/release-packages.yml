name: Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          TARGET: ${{ matrix.target }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          mkdir -p "dist/package"
          go build -trimpath -ldflags="-s -w" -o "dist/package/vault" ./cmd/vault
          cp README.md LICENSE "dist/package/"
          tar -C "dist/package" -czf "dist/myminivault_${TAG_NAME}_${TARGET}.tar.gz" vault README.md LICENSE
          shasum -a 256 "dist/myminivault_${TAG_NAME}_${TARGET}.tar.gz" > "dist/myminivault_${TAG_NAME}_${TARGET}.tar.gz.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          gh release upload "$TAG_NAME" \
            "dist/myminivault_${TAG_NAME}_${TARGET}.tar.gz" \
            "dist/myminivault_${TAG_NAME}_${TARGET}.tar.gz.sha256" \
            --clobber
