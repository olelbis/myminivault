name: Documentation feedback
description: Report unclear, missing or outdated documentation.
title: "Docs: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Page or section
      description: Link or name the README/docs section that needs work.
      placeholder: README Quick Start, docs/user-manual.md token section, etc.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
      description: Describe the gap or outdated wording.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or example
      description: Optional, but helpful.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include real secrets, tokens, recovery keys or vault files.
          required: true
