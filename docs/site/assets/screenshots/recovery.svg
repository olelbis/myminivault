<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">myminivault recovery terminal screenshot</title>
  <desc id="desc">A terminal-style screenshot showing recovery setup and validation.</desc>
  <rect width="900" height="420" rx="14" fill="#101018"/>
  <rect x="0" y="0" width="900" height="46" rx="14" fill="#1d1b2f"/>
  <circle cx="24" cy="23" r="7" fill="#ff5f57"/>
  <circle cx="48" cy="23" r="7" fill="#ffbd2e"/>
  <circle cx="72" cy="23" r="7" fill="#28c840"/>
  <text x="450" y="29" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="15" fill="#c4b5fd">recovery workflow</text>
  <g font-family="Menlo, Consolas, monospace" font-size="20">
    <text x="34" y="86" fill="#c4b5fd">$ ./bin/vault setup-recovery</text>
    <text x="34" y="122" fill="#e2e8f0">🔑 Your Recovery Key (SAVE THIS SAFELY!)</text>
    <text x="34" y="166" fill="#fbbf24">N7QK2-F9T6A-...-4LZ9P</text>
    <text x="34" y="210" fill="#94a3b8">Type the recovery key to confirm you saved it:</text>
    <text x="34" y="246" fill="#e2e8f0">✅ Recovery key setup complete!</text>
    <text x="34" y="302" fill="#c4b5fd">$ ./bin/vault test-recovery</text>
    <text x="34" y="338" fill="#94a3b8">Enter recovery key to test:</text>
    <text x="34" y="374" fill="#e2e8f0">✅ Recovery key is valid!</text>
  </g>
</svg>
